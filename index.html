  <style>
    body {

      background: #f5efe6;
      color: #3b2f2f;
      text-align: center;
      padding: 32px 18px;
    }

    .container {
      max-width: 520px;
      margin: auto;
      background: #fffaf3;
      padding: 32px 24px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .course {
      font-size: 18px;
      color: #8b5e3c;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .title {
      font-size: 34px;
      line-height: 1.35;
      font-weight: bold;
      margin: 12px 0 16px;
    }

    .group {
      display: inline-block;
      background: #8b5e3c;
      color: white;
      padding: 8px 24px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    .members {
      background: #f3e4d2;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 26px;
      text-align: left;
    }

    .members h2 {
      text-align: center;
      margin-top: 0;
      font-size: 22px;
      color: #6f472b;
    }

    .member {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed #c8a98c;
      padding: 8px 0;
      font-size: 18px;
    }

    .member:last-child {
      border-bottom: none;
    }

    .button {
      display: block;
      text-decoration: none;
      color: white;
      padding: 22px;
      margin: 18px 0;
      border-radius: 18px;
      font-size: 22px;
      font-weight: bold;
    }

    .photo {
      background: #b55f32;
    }

    .map {
      background: #4f7c58;
    }

    .small {
      display: block;
      font-size: 14px;
      font-weight: normal;
      margin-top: 6px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
